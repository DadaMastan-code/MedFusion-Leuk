name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install torch torchvision --index-url https://download.pytorch.org/whl/cpu
          pip install timm xgboost shap scikit-learn numpy pandas pdfplumber
          pip install fastapi uvicorn httpx pydantic python-multipart
          pip install sentence-transformers faiss-cpu
          pip install Pillow opencv-python-headless matplotlib seaborn
          pip install python-dotenv tqdm pytest

      - name: Run tests
        run: python -m pytest tests/ -v --tb=short
